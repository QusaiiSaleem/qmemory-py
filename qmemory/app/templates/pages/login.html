{% extends "base.html" %}
{% block title %}تسجيل الدخول — Qmemory{% endblock %}
{% block content %}
<div class="flex justify-center items-center min-h-[80vh]">
    <div class="card w-96 bg-base-100 shadow-xl">
        <div class="card-body">
            <h2 class="card-title text-2xl mb-4">🧠 Qmemory</h2>
            <p class="text-sm text-gray-500 mb-4">ذاكرة الرسم البياني لعملاء الذكاء الاصطناعي</p>

            {% if error %}
            <div class="alert alert-error mb-4">
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-control mb-3">
                    <label class="label"><span class="label-text">البريد الإلكتروني</span></label>
                    <input type="email" name="email" class="input input-bordered" required dir="ltr">
                </div>
                <div class="form-control mb-4">
                    <label class="label"><span class="label-text">كلمة المرور</span></label>
                    <input type="password" name="password" class="input input-bordered" required dir="ltr">
                </div>
                <button type="submit" class="btn btn-primary w-full">دخول</button>
            </form>

            <p class="text-center mt-4 text-sm">
                ما عندك حساب؟ <a href="/signup" class="link link-primary">سجّل الآن</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
