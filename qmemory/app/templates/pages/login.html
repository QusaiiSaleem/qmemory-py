<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>qmemory — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ffaa;
            --primary-dim: #00cc88;
            --primary-glow: rgba(0, 255, 170, 0.15);
            --primary-glow-strong: rgba(0, 255, 170, 0.4);
            --bg-color: #050505;
            --bg-elevated: #0a0a0a;
            --bg-card: rgba(8, 8, 8, 0.9);
            --text-muted: #555;
            --text-dim: #888;
            --border-color: #222;
            --danger: #ff4d6d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg-color);
            color: #e0e0e0;
            font-family: 'Space Grotesk', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-image: radial-gradient(circle at 70% 30%, var(--primary-glow) 0%, transparent 60%);
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6), 0 0 80px var(--primary-glow);
        }
        h1 {
            font-family: 'JetBrains Mono', monospace;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            font-size: 1.8rem;
        }
        .lede {
            color: var(--text-dim);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        label {
            display: block;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        input[type="text"] {
            width: 100%;
            background: var(--bg-elevated);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.9rem 1rem;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        button {
            width: 100%;
            background: var(--primary-color);
            border: none;
            border-radius: 6px;
            padding: 1rem;
            color: var(--bg-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
        }
        button:hover {
            background: var(--primary-dim);
            box-shadow: 0 0 20px var(--primary-glow-strong);
        }
        .error {
            background: rgba(255, 77, 109, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.9rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .help-text {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
            line-height: 1.6;
            text-align: center;
        }
        .help-text a {
            color: var(--primary-color);
            text-decoration: none;
        }
        .help-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>qmemory</h1>
        <p class="lede">Sign in with your personal URL. Paste the whole URL you saved at signup — or just the code part if you remember it.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            {% if return_to %}
            <input type="hidden" name="return_to" value="{{ return_to }}" />
            {% endif %}
            <label for="user_input">Your personal URL or code</label>
            <input
                type="text"
                id="user_input"
                name="user_input"
                required
                autofocus
                placeholder="{{ base_url }}/mcp/u/your-code/"
            />
            <button type="submit">Sign in</button>
        </form>

        <div class="help-text">
            No account yet? <a href="/signup">Create one in 10 seconds</a>. Zero friction, zero email.
        </div>
    </div>
</body>
</html>
