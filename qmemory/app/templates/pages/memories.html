{% extends "base.html" %}
{% block title %}Memories — Qmemory{% endblock %}
{% block content %}

<div x-data="{ activeCategory: '' }">

    <div class="page-header">
        <h1 class="page-title">Memories</h1>
        <p class="page-subtitle">Browse and search your saved memories</p>
    </div>

    <!-- =========================================================
         Search Input — HTMX active search with 300ms debounce
         ========================================================= -->
    <div class="form-group">
        <div style="position: relative;">
            <input
                type="text"
                id="search-input"
                name="q"
                class="form-input"
                style="padding-left: 44px;"
                placeholder="Search your memories..."
                dir="auto"
                hx-get="/memories/search"
                hx-trigger="input changed delay:300ms, search"
                hx-target="#results"
                hx-include="[name='category']"
            >
            <svg xmlns="http://www.w3.org/2000/svg" style="position: absolute; left: 14px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; color: var(--text-muted);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
    </div>

    <!-- =========================================================
         Category Filter Pills — all 8 categories + "all"
         ========================================================= -->
    <div class="filter-pills">
        <!-- "All" button -->
        <button
            class="filter-pill"
            :class="activeCategory === '' ? 'active' : ''"
            @click="activeCategory = ''; document.getElementById('category-input').value = ''; htmx.trigger('#search-input', 'search')"
        >All</button>

        <!-- Category buttons -->
        {% for cat in categories %}
        <button
            class="filter-pill"
            :class="activeCategory === '{{ cat }}' ? 'active' : ''"
            @click="activeCategory = '{{ cat }}'; document.getElementById('category-input').value = '{{ cat }}'; htmx.trigger('#search-input', 'search')"
        >{{ cat }}</button>
        {% endfor %}

        <!-- Hidden input to send category value with HTMX request -->
        <input type="hidden" id="category-input" name="category" value="">
    </div>

    <!-- =========================================================
         Results Area — populated by HTMX from /memories/search
         ========================================================= -->
    <div id="results"
         hx-get="/memories/search"
         hx-trigger="load"
         hx-include="[name='q'], [name='category']"
    >
        <!-- Initial loading state -->
        <div class="loading">
            <div class="loading-spinner"></div>
        </div>
    </div>

</div>

{% endblock %}
