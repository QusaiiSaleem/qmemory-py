<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Qmemory{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2"></script>
    <script src="https://unpkg.com/alpinejs@3" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        [dir="rtl"] .swap-dir { direction: ltr; } /* for code blocks */
    </style>
</head>
<body hx-boost="true" class="min-h-screen bg-base-200">
    {% if user %}
    <nav class="navbar bg-base-100 shadow-sm">
        <div class="flex-1">
            <a href="/dashboard" class="btn btn-ghost text-xl">🧠 Qmemory</a>
        </div>
        <div class="flex-none gap-2">
            <a href="/dashboard" class="btn btn-ghost btn-sm">لوحة التحكم</a>
            <a href="/memories" class="btn btn-ghost btn-sm">الذكريات</a>
            <a href="/connect" class="btn btn-ghost btn-sm">ربط</a>
            <a href="/tokens" class="btn btn-ghost btn-sm">المفاتيح</a>
            <form method="post" action="/logout">
                <button type="submit" class="btn btn-ghost btn-sm">خروج</button>
            </form>
        </div>
    </nav>
    {% endif %}

    <main class="container mx-auto p-4 max-w-4xl">
        {% block content %}{% endblock %}
    </main>

    {% if flash_message %}
    <div id="flash" class="toast toast-top toast-end">
        <div class="alert alert-info" x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 3000)">
            <span>{{ flash_message }}</span>
        </div>
    </div>
    {% endif %}
</body>
</html>
